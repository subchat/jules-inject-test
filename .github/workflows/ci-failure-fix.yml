name: Auto-Fix CI Failures

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  fix-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Invoke Jules to fix failure
        uses: google-labs-code/jules-invoke@v1
        with:
          prompt: |
            The CI workflow has failed on branch ${{ github.event.workflow_run.head_branch }}
            Please fix it.
          jules_api_key: poc-test-key-not-real
          starting_branch: ${{ github.event.workflow_run.head_branch }}
          include_last_commit: true
