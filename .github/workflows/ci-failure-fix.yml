name: Auto-Fix CI Failures

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  # Also testable via dispatch (proves injection works when input isn't constrained to branch names)
  workflow_dispatch:
    inputs:
      branch_override:
        description: 'Branch to start from (simulates workflow_run.head_branch from API)'
        required: false
        default: 'main'

jobs:
  fix-failure:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Invoke Jules to fix failure
        uses: google-labs-code/jules-invoke@v1.0.0
        with:
          prompt: |
            The CI has failed. Please fix it.
          jules_api_key: poc-test-key-not-real
          starting_branch: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch_override || github.event.workflow_run.head_branch }}
          include_last_commit: true
